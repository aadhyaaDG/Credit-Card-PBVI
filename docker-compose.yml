services:
  pipeline:
    build: .
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./source:/app/source:ro
      - ./data:/app/data
      - ./dbt_project:/app/dbt_project
      - ./pipeline.py:/app/pipeline.py
      - ./verification:/app/verification
    command: python pipeline.py --help
